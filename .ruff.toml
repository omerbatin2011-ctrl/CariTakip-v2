target-version = "py314"
line-length = 100
exclude = ["yedekler", "logs", "build", "dist", "__pycache__"]

[lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[lint.per-file-ignores]
"**/__init__.py" = ["F401"]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
docstring-code-format = true
