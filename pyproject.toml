[tool.ruff]
target-version = "py314"
line-length = 100
exclude = [
    "yedekler",
    "logs",
    "build",
    "dist",
    "__pycache__",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"**/__init__.py" = ["F401"]

[tool.black]
line-length = 100
target-version = ["py314"]
exclude = "yedekler|logs|build|dist"

[tool.isort]
profile = "black"
line_length = 100
skip = ["yedekler", "logs", "build", "dist"]
